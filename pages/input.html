<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>출강 내역 입력 - 스마트 출강 관리 시스템</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/input-form.css">
</head>
<body>

<div class="system-header">
    <div class="header-container">
        <div class="header-left">
            <a href="../index.html" class="header-logo">🏫 출강 관리 시스템</a>
        </div>
        <div class="header-right">
            <button class="nav-btn btn-add" onclick="location.href='input.html'">📅 일정 추가</button>
            <button class="nav-btn btn-manage" onclick="location.href='manage.html'">📊 정산 관리</button>
        </div>
    </div>
</div>

<div class="form-card">
    <div class="form-header">
        <h2>📝 신규 일정 등록</h2>
    </div>
    
    <div class="form-body">
        <form id="lectureForm">
            <div class="form-grid">
                <div class="form-group"><label>1. 날짜</label><input type="date" id="date" required></div>
                
                <div class="form-group">
                    <label>2. 시간 (24시간 형식)</label>
                    <div class="time-group">
                        <input type="text" id="startTime" placeholder="14:00" maxlength="5" oninput="autoColon(this)" inputmode="numeric" required>
                        <span class="time-separator">~</span>
                        <input type="text" id="endTime" placeholder="16:00" maxlength="5" oninput="autoColon(this)" inputmode="numeric" required>
                    </div>
                </div>

                <div class="form-group"><label>3. 프로그램명</label><input type="text" id="program" required></div>
                <div class="form-group"><label>4. 기관명(학교)</label><input type="text" id="institution" required></div>
                
                <div class="form-group"><label>5. 학년</label><input type="text" id="grade"></div>
                <div class="form-group"><label>6. 대상인원</label><input type="number" id="students"></div>

                <div class="form-group"><label>7. 주강사</label><input type="text" id="mainTeacher" required></div>
                <div class="form-group"><label>8. 보조강사</label><input type="text" id="subTeacher"></div>

                <div class="form-group"><label>9. 교구종류</label><input type="text" id="toolType"></div>
                <div class="form-group"><label>10. 교구수량</label><input type="number" id="toolCount"></div>

                <div class="form-group full-width">
                    <label>11. 글자 색상</label>
                    <select id="color" onchange="this.style.color = this.value;" style="color: #2c3e50;">
                        <option value="#2c3e50" style="color: #2c3e50;">검정 (기본)</option>
                        <option value="#3498db" style="color: #3498db;">파랑</option>
                        <option value="#e74c3c" style="color: #e74c3c;">빨강</option>
                        <option value="#2ecc71" style="color: #2ecc71;">초록</option>
                        <option value="#f39c12" style="color: #f39c12;">오렌지</option>
                        <option value="#9b59b6" style="color: #9b59b6;">보라</option>
                        <option value="#1abc9c" style="color: #1abc9c;">청록</option>
                        <option value="#34495e" style="color: #34495e;">진회색</option>
                        <option value="#e67e22" style="color: #e67e22;">황토</option>
                        <option value="#d35400" style="color: #d35400;">진한 주황</option>
                    </select>
                </div>

                <div class="form-group full-width">
                    <label>12. 비고</label>
                    <textarea id="note" rows="3"></textarea>
                </div>
            </div>

            <div class="btn-group">
                <button type="submit" class="btn-common btn-submit" id="submitBtn">저장하기</button>
                <button type="button" class="btn-common btn-back" onclick="location.href='index.html'">취소하기</button>
            </div>
        </form>
    </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/input-handler.js"></script>
</body>
</html>
