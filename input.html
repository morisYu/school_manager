<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>출강 내역 입력</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #f4f7f6; padding: 20px; display: flex; justify-content: center; }
        .form-card { background: white; padding: 30px; border-radius: 15px; width: 100%; max-width: 500px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; font-size: 0.9em; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .time-group { display: flex; gap: 10px; align-items: center; }
        .btn-submit { width: 100%; padding: 16px; background: #3498db; color: white; border: none; border-radius: 8px; font-size: 1em; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        .btn-submit:hover { background: #2980b9; }
        .btn-back { width: 100%; margin-top: 10px; background: none; border: none; color: #888; cursor: pointer; }
    </style>
</head>
<body>
<div class="form-card">
    <h2>📝 수업 내역 등록</h2>
    <form id="lectureForm">
        <div class="form-group"><label>1. 날짜</label><input type="date" id="date" required></div>
        <div class="form-group"><label>2. 시간 (시작 ~ 종료)</label>
            <div class="time-group"><input type="time" id="startTime" required><span>~</span><input type="time" id="endTime" required></div>
        </div>
        <div class="form-group"><label>3. 프로그램명</label><input type="text" id="program" required></div>
        <div class="form-group"><label>4. 기관명(학교)</label><input type="text" id="institution" required></div>
        <div class="form-group"><label>5. 학년</label><input type="text" id="grade"></div>
        <div class="form-group"><label>6. 대상인원</label><input type="number" id="students"></div>
        <div style="display:flex; gap:10px;">
            <div class="form-group" style="flex:1;"><label>7. 주강사</label><input type="text" id="mainTeacher" required></div>
            <div class="form-group" style="flex:1;"><label>8. 보조강사</label><input type="text" id="subTeacher"></div>
        </div>
        <div style="display:flex; gap:10px;">
            <div class="form-group" style="flex:2;"><label>9. 교구종류</label><input type="text" id="toolType"></div>
            <div class="form-group" style="flex:1;"><label>10. 교구수량</label><input type="number" id="toolCount"></div>
        </div>
        <div class="form-group"><label>11. 비고</label><textarea id="note" rows="2"></textarea></div>
        <button type="submit" class="btn-submit" id="submitBtn">구글 시트에 저장하기</button>
        <button type="button" class="btn-back" onclick="location.href='index.html'">돌아가기</button>
    </form>
</div>
<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyTMFj7peDa4JSiq6RE1Uvd04n84LUW5HdREtdS4OuTU93S61oQqvRjyAVf6NSVI6hF/exec';
    document.getElementById('lectureForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.innerText = '저장 중...'; btn.disabled = true;

        const formData = {
            date: document.getElementById('date').value,
            startTime: document.getElementById('startTime').value,
            endTime: document.getElementById('endTime').value,
            program: document.getElementById('program').value,
            institution: document.getElementById('institution').value,
            grade: document.getElementById('grade').value,
            students: document.getElementById('students').value,
            mainTeacher: document.getElementById('mainTeacher').value,
            subTeacher: document.getElementById('subTeacher').value,
            toolType: document.getElementById('toolType').value,
            toolCount: document.getElementById('toolCount').value,
            note: document.getElementById('note').value
        };

        fetch(GAS_URL, { method: 'POST', body: JSON.stringify(formData) })
        .then(() => { alert('성공적으로 저장되었습니다!'); location.href = 'index.html'; })
        .catch(() => { alert('실패했습니다.'); btn.disabled = false; btn.innerText = '다시 시도'; });
    });
</script>
</body>
</html>
