<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>실시간 정산 관리</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; padding: 25px; background: #fafafa; }
        .header-box { background: #2c3e50; color: white; padding: 20px; border-radius: 8px; display: flex; gap: 10px; align-items: center; margin-bottom: 20px; }
        .card-row { display: flex; gap: 15px; margin-bottom: 20px; }
        .card { flex: 1; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid #ddd; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        th { background: #f8f9fa; font-size: 0.9em; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; background: #eee; }
        @media print { .header-box, .btn-home { display: none; } }
    </style>
</head>
<body>
    <div class="header-box">
        <select id="t-sel"><option value="">강사 선택</option></select>
        <input type="month" id="m-sel">
        <button onclick="calc()" style="padding:10px 15px; cursor:pointer;">조회</button>
        <button onclick="window.print()" style="padding:10px 15px; background:#27ae60; color:white; border:none; border-radius:4px; cursor:pointer;">PDF 출력</button>
    </div>

    <div class="card-row">
        <div class="card" style="border-color:#e67e22;"><h3>주강사</h3><p id="h-main">0.0h</p></div>
        <div class="card" style="border-color:#3498db;"><h3>보조강사</h3><p id="h-sub">0.0h</p></div>
    </div>

    <table id="res-table">
        <thead><tr><th>날짜</th><th>기관명</th><th>프로그램</th><th>역할</th><th>시간</th></tr></thead>
        <tbody id="res-body"></tbody>
    </table>
    <button class="btn-home" onclick="location.href='index.html'" style="margin-top:20px; cursor:pointer;">홈으로</button>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbyTMFj7peDa4JSiq6RE1Uvd04n84LUW5HdREtdS4OuTU93S61oQqvRjyAVf6NSVI6hF/exec';
        let db = [];

        window.onload = function() {
            fetch(GAS_URL)
                .then(res => res.json())
                .then(data => {
                    db = data;
                    const ts = new Set();
                    db.forEach(r => { if(r['주강사']) ts.add(r['주강사']); if(r['보조강사']) ts.add(r['보조강사']); });
                    const sel = document.getElementById('t-sel');
                    ts.forEach(t => { const o = document.createElement('option'); o.value=t; o.text=t; sel.add(o); });
                });
        };

        function calc() {
            const name = document.getElementById('t-sel').value;
            const month = document.getElementById('m-sel').value;
            if(!name || !month) return alert('강사와 월을 선택하세요.');

            const filtered = db.filter(r => (r['주강사']===name || r['보조강사']===name) && r['날짜']?.startsWith(month));
            let mH = 0, sH = 0;
            const html = filtered.map(r => {
                const isM = r['주강사'] === name;
                const start = new Date(`2000-01-01T${r['시작시간']}`);
                const end = new Date(`2000-01-01T${r['종료시간']}`);
                const duration = (end - start) / (1000 * 60 * 60) || 0;
                isM ? mH += duration : sH += duration;
                return `<tr><td>${r['날짜']}</td><td>${r['기관명']}</td><td>${r['프로그램명']}</td><td><span class="badge">${isM?'주강사':'보조강사'}</span></td><td>${duration.toFixed(1)}h (${r['시작시간']}~${r['종료시간']})</td></tr>`;
            }).join('');

            document.getElementById('res-body').innerHTML = html || '<tr><td colspan="5" style="text-align:center;">내역 없음</td></tr>';
            document.getElementById('h-main').innerText = mH.toFixed(1) + 'h';
            document.getElementById('h-sub').innerText = sH.toFixed(1) + 'h';
        }
    </script>
</body>
</html>
