<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강의 관리 시스템 - 최종 수정본</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --danger: #e74c3c; --bg: #f4f7f9; }
        body { margin: 0; font-family: 'Pretendard', sans-serif; background: var(--bg); }
        .wrapper { padding: 10px; height: 100vh; display: flex; flex-direction: column; box-sizing: border-box; }
        
        .nav-bar { background: var(--primary); color: white; padding: 12px 20px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .nav-links a { color: white; text-decoration: none; font-weight: bold; font-size: 0.85em; padding: 6px 12px; border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; }

        #calendar-container { background: white; padding: 10px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); flex-grow: 1; min-height: 0; }
        
        /* 3. 캘린더 이벤트 2줄 및 글자 크기 강화 */
        .fc-event-main { padding: 2px !important; }
        .event-wrapper { display: flex; flex-direction: column; line-height: 1.3; }
        .event-line1 { font-weight: 800 !important; font-size: 12px !important; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .event-line2 { font-weight: 400 !important; font-size: 11px !important; color: rgba(255,255,255,0.9); display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* 모달 스타일 */
        #modalOverlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:999; backdrop-filter: blur(2px); }
        #editModal { display: none; position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 15px; width: 92%; max-width: 500px; z-index: 1000; box-shadow: 0 20px 40px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group.full { grid-column: span 2; }
        label { font-size: 0.75em; font-weight: bold; color: #7f8c8d; margin-bottom: 3px; }
        input, select, textarea { padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9em; }
        
        .btn-group { margin-top: 20px; display: flex; gap: 8px; }
        .btn-save { flex: 2; background: #3498db; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-delete { flex: 1; background: #fff; color: var(--danger); border: 1px solid var(--danger); padding: 12px; border-radius: 8px; cursor: pointer; }
        .btn-close { flex: 1; background: #eee; border: none; padding: 12px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="nav-bar">
            <strong>🏫 출강 관리 시스템</strong>
            <div class="nav-links">
                <a href="manage.html" style="margin-right: 5px;">📊 정산</a>
                <a href="input.html">+ 추가</a>
            </div>
        </div>
        <div id="calendar-container"><div id="calendar"></div></div>
    </div>

    <div id="modalOverlay" onclick="closeModal()"></div>
    <div id="editModal">
        <h3 style="margin:0 0 10px 0; font-size: 1.1em;">일정 수정</h3>
        <input type="hidden" id="edit-row">
        <div class="form-grid">
            <div class="form-group full"><label>기관명</label><input type="text" id="edit-institution"></div>
            <div class="form-group full"><label>프로그램명</label><input type="text" id="edit-program"></div>
            <div class="form-group"><label>날짜</label><input type="date" id="edit-date"></div>
            <div class="form-group"><label>색상</label>
                <select id="edit-color">
                    <option value="#3498db">파랑 (기본)</option>
                    <option value="#e74c3c">빨강 (중요)</option>
                    <option value="#2ecc71">초록 (완료)</option>
                    <option value="#f1c40f">노랑 (대기)</option>
                </select>
            </div>
            <div class="form-group"><label>시작시간</label><input type="time" id="edit-start"></div>
            <div class="form-group"><label>종료시간</label><input type="time" id="edit-end"></div>
            
            <div class="form-group"><label>학년</label><input type="text" id="edit-grade"></div>
            <div class="form-group"><label>대상인원</label><input type="text" id="edit-students"></div>
            
            <div class="form-group"><label>주강사</label><input type="text" id="edit-main"></div>
            <div class="form-group"><label>보조강사</label><input type="text" id="edit-sub"></div>
            <div class="form-group"><label>교구종류</label><input type="text" id="edit-tool"></div>
            <div class="form-group"><label>교구수량</label><input type="number" id="edit-count"></div>
            <div class="form-group full"><label>비고</label><textarea id="edit-note" rows="2"></textarea></div>
        </div>
        <div class="btn-group">
            <button class="btn-save" onclick="processData('update')">저장</button>
            <button class="btn-delete" onclick="processData('delete')">삭제</button>
            <button class="btn-close" onclick="closeModal()">닫기</button>
        </div>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzst3PGPjqrF9DCqfQFl6bFztp-AsIYq0LfuFJhYoFh5I1k1iG7oQ7XBJeCRpmYxio2/exec'; 

        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            const calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'ko',
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,listWeek' },
                events: function(info, successCallback, failureCallback) {
                    fetch(GAS_URL).then(res => res.json()).then(data => {
                        const events = data.map(r => {
                            // 1. 날짜 밀림 방지: 문자열에서 직접 날짜 부분만 추출
                            const datePart = r['날짜'].split('T')[0];
                            const sTime = extractTime(r['시작시간']);
                            const eTime = extractTime(r['종료시간']);
                            
                            return {
                                title: r['프로그램명'],
                                start: `${datePart}T${sTime}`,
                                end: `${datePart}T${eTime}`,
                                color: r['색상'] || '#3498db',
                                extendedProps: r
                            };
                        });
                        successCallback(events);
                    });
                },
                // 3. 2줄 표시 및 스타일 강화
                eventContent: function(arg) {
                    const p = arg.event.extendedProps;
                    const time = extractTime(p['시작시간']);
                    return {
                        html: `
                        <div class="event-wrapper">
                            <div class="event-line1">${time} | ${p['기관명']}</div>
                            <div class="event-line2">${p['프로그램명']}</div>
                        </div>`
                    };
                },
                eventClick: function(info) { openModal(info.event.extendedProps); }
            });
            calendar.render();
            window.myCalendar = calendar;
        });

        function extractTime(val) {
            const match = String(val).match(/\d{2}:\d{2}/);
            return match ? match[0] : "09:00";
        }

        function openModal(p) {
            document.getElementById('edit-row').value = p.row;
            document.getElementById('edit-institution').value = p['기관명'] || '';
            document.getElementById('edit-program').value = p['프로그램명'] || '';
            // 날짜 밀림 방지 처리가 된 문자열 사용
            document.getElementById('edit-date').value = p['날짜'].split('T')[0];
            document.getElementById('edit-start').value = extractTime(p['시작시간']);
            document.getElementById('edit-end').value = extractTime(p['종료시간']);
            
            // 2. 누락되었던 데이터 바인딩
            document.getElementById('edit-grade').value = p['학년'] || '';
            document.getElementById('edit-students').value = p['대상인원'] || '';
            
            document.getElementById('edit-main').value = p['주강사'] || '';
            document.getElementById('edit-sub').value = p['보조강사'] || '';
            document.getElementById('edit-tool').value = p['교구종류'] || '';
            document.getElementById('edit-count').value = p['교구수량'] || 0;
            document.getElementById('edit-note').value = p['비고'] || '';
            document.getElementById('edit-color').value = p['색상'] || '#3498db';
            
            document.getElementById('modalOverlay').style.display = 'block';
            document.getElementById('editModal').style.display = 'block';
        }

        function processData(action) {
            if (action === 'delete' && !confirm("정말 삭제하시겠습니까?")) return;
            
            const btn = document.querySelector('.btn-save');
            btn.innerText = '처리 중...'; btn.disabled = true;

            const payload = {
                action: action,
                row: document.getElementById('edit-row').value,
                date: document.getElementById('edit-date').value,
                startTime: document.getElementById('edit-start').value,
                endTime: document.getElementById('edit-end').value,
                program: document.getElementById('edit-program').value,
                institution: document.getElementById('edit-institution').value,
                
                // 2. 수정 시 데이터 보존
                grade: document.getElementById('edit-grade').value,
                students: document.getElementById('edit-students').value,
                
                mainTeacher: document.getElementById('edit-main').value,
                subTeacher: document.getElementById('edit-sub').value,
                toolType: document.getElementById('edit-tool').value,
                toolCount: document.getElementById('edit-count').value,
                note: document.getElementById('edit-note').value,
                color: document.getElementById('edit-color').value
            };

            fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) })
            .then(() => {
                alert('처리되었습니다.');
                closeModal();
                window.myCalendar.refetchEvents();
            })
            .finally(() => { btn.innerText = '저장'; btn.disabled = false; });
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
            document.getElementById('editModal').style.display = 'none';
        }
    </script>
</body>
</html>
