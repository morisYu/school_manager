<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="shortcut icon" href="./favicon_images/favicon.ico" type="image/x-icon">
    <link rel="icon" href="./favicon_images/favicon.ico" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon_images/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon_images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="./favicon_images/favicon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="./favicon_images/favicon-512x512.png">
    <link rel="apple-touch-icon" href="./favicon_images/favicon-192x192.png">

    <meta name="msapplication-TileImage" content="./favicon_images/favicon-192x192.png">
    <meta name="msapplication-TileColor" content="#2c3e50">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 강의 관리 시스템 Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    
    <style>
        /* 배경색을 흰색(#ffffff)으로 통일하거나 기존 배경 변수를 변경합니다 */
        :root { --primary: #2c3e50; --bg: #ffffff; } /* --bg를 #ffffff로 수정 */
        
        body { margin: 0; font-family: 'Pretendard', sans-serif; background: var(--bg); }
        
        .wrapper { 
            padding: 10px; 
            height: 100vh; /* 화면 높이를 100% 사용 */
            display: flex; 
            flex-direction: column; 
            box-sizing: border-box; 
            background: #ffffff; /* 본문 영역 배경을 확실하게 흰색으로 지정 */
            overflow: hidden; /* 전체 페이지 스크롤 방지 */
        }
        
        /* 상단 네비게이션 */
        .nav-bar { background: var(--primary); color: white; padding: 12px 20px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .nav-links a { color: white; text-decoration: none; font-weight: bold; font-size: 0.85em; padding: 6px 12px; border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; }

        /* 캘린더 컨테이너 하단 그림자 제거 (선택 사항) */
        #calendar-container { 
            background: white; 
            padding: 10px; 
            border-radius: 12px; 
            flex-grow: 1; /* 남은 공간을 달력이 모두 차지하도록 설정 */
            min-height: 0; /* 중요: flex 아이템이 컨테이너를 벗어나지 않게 함 */
            display: flex;
            flex-direction: column;
        }

        #calendar {
        height: 100%; /* 부모 컨테이너 높이에 꽉 맞춤 */
        }
        
        /* ★ [핵심] 폰트 크기 및 스타일 강제 고정 ★ */
        .fc-event { background: transparent !important; border: none !important; margin: 1px 0 !important; }
        .fc-event-main { padding: 0 !important; }
        
        .event-wrapper { 
            padding: 4px 6px !important; 
            border-radius: 4px !important; 
            border-left: 5px solid !important; /* 왼쪽 강조 바 */
            display: flex !important; 
            flex-direction: column !important;
            line-height: 1.4 !important;
            background: rgba(0,0,0,0.03); /* 아주 연한 배경으로 영역 구분 */
        }

        .event-line1 { 
            font-weight: 800 !important; 
            font-size: 15px !important; /* 첫 줄 폰트 크기 */
            white-space: nowrap !important;
            overflow: hidden !important;
            text-overflow: ellipsis !important;
        }

        .event-line2 { 
            font-weight: 600 !important; 
            font-size: 13px !important; /* 둘째 줄 폰트 크기 */
            opacity: 0.85 !important;
            white-space: nowrap !important;
            overflow: hidden !important;
            text-overflow: ellipsis !important;
        }

        /* 캘린더 기본 시간/제목 숨기기 (우리가 직접 커스텀하므로) */
        .fc-event-time, .fc-event-title { display: none !important; }

        /* 모달 스타일 */
        /* 모달 헤더 스타일 추가 */
        .modal-header {
            background: #f8fbc2; /* 연한 노란색으로 귀여운 느낌 추가 */
            margin: -30px -30px 20px -30px;
            padding: 20px 30px;
            border-radius: 25px 25px 0 0;
            border-bottom: 2px solid #edf2f7;
        }
        .modal-header h3 {
            margin: 0;
            color: #2980b9;
            font-size: 1.2em;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #modalOverlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:999; backdrop-filter: blur(2px); }
        #editModal { 
            display: none; 
            position: fixed; 
            left: 50%; 
            top: 50%; 
            transform: translate(-50%, -50%); 
            background: white; 
            padding: 30px; 
            border-radius: 25px; /* 더 둥글게 해서 귀여운 느낌 강조 */
            width: 92%; 
            max-width: 500px; 
            z-index: 1000; 
            max-height: 85vh; 
            overflow-y: auto; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.15); /* 부드러운 그림자 */
            border: 3px solid #f0f4f8; /* 외곽선 추가 */
        }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group.full { grid-column: span 2; }
        /* 입력창 및 레이블 Bold 적용 */
        label { 
            font-size: 0.88em; 
            font-weight: 800; 
            color: #2980b9; /* 깊이 있는 블루톤 */
            margin-bottom: 6px; 
            margin-left: 2px;
            display: block;
        }
        /* 입력창 전체: 날짜, 시간, 비고(textarea) 포함 모든 필드 Bold 적용 */
        input[type="text"], 
        input[type="number"], 
        input[type="date"], 
        input[type="time"], 
        input[type="color"],
        select, 
        textarea { 
            width: 100%;
            padding: 12px; 
            border: 2px solid #edf2f7; 
            border-radius: 12px; 
            font-size: 1em; 
            /* 핵심: 모든 입력 요소에 볼드 스타일 강제 적용 */
            font-family: inherit;
            font-weight: 800 !important; 
            color: #2d3436;
            background: #fdfdfd;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }
        /* 비고(textarea) 높이 조절 및 스타일 */
        /* 바로 위 textarea 하고 이름 같지만 고유 특성을 따로 빼는게 유리함 */
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        /* 날짜 및 시간 입력창 내부 아이콘/글자도 볼드 처리 (브라우저 지원 범위 내) */
        input::-webkit-datetime-edit,
        input::-webkit-datetime-edit-fields-wrapper,
        input::-webkit-datetime-edit-text,
        input::-webkit-datetime-edit-minute,
        input::-webkit-datetime-edit-hour,
        input::-webkit-datetime-edit-day,
        input::-webkit-datetime-edit-month,
        input::-webkit-datetime-edit-year {
            font-weight: 800;
        }
        /* 입력창 포커스 시 부드러운 효과 강조 */
        input:focus, select:focus, textarea:focus { 
            border-color: #3498db; 
            background: #ffffff;
            box-shadow: 0 0 12px rgba(52, 152, 219, 0.15);
            transform: translateY(-1px); /* 살짝 떠오르는 효과 */
        }

        /* 비고란 스크롤바 디자인 */
        textarea::-webkit-scrollbar {
            width: 8px;
        }
        textarea::-webkit-scrollbar-thumb {
            background: #dfe6e9;
            border-radius: 10px;
        }
        .btn-group { 
            margin-top: 30px; 
            display: flex; 
            gap: 10px; 
            justify-content: space-between;
        }
        .btn-group button { 
            flex: 1; /* 모든 버튼의 크기를 동일하게 */
            padding: 15px 0; 
            border-radius: 15px; 
            font-weight: 800; 
            font-size: 0.95em; 
            cursor: pointer; 
            border: none;
            transition: transform 0.1s, opacity 0.2s;
        }
        .btn-group button:active { transform: scale(0.96); }
        /* 버튼 호버 효과 추가 */
        .btn-group button:hover {
            opacity: 0.9;
            filter: brightness(1.05);
        }
        .btn-save { background: #3498db; color: white; }
        .btn-delete { background: #ff7675; color: white; } /* 빨간색 계열을 부드럽게 */
        .btn-close { background: #dfe6e9; color: #636e72; }
        /* 입력창 시간 부분 디자인 */
        input[type="text"]#edit-start, 
        input[type="text"]#edit-end {
            text-align: center; /* 시간 입력을 보기 좋게 가운데로 정렬 */
            letter-spacing: 1px; /* 글자 간격을 넓혀 가독성 향상 */
        }
    </style>
</head>
    
<body>
    <div class="wrapper">
        <div class="nav-bar">
            <strong>🏫 스마트 출강 관리 시스템</strong>
            <div class="nav-links">
                <a href="manage.html" style="margin-right: 5px;">📊 정산 관리</a>
                <a href="input.html">+ 일정 추가</a>
            </div>
        </div>
        <div id="calendar-container"><div id="calendar"></div></div>
    </div>

    <div id="modalOverlay" onclick="closeModal()"></div>
    <div id="editModal">
        <div class="modal-header">
            <h3>📅 일정 상세 및 수정</h3>
        </div>
        <input type="hidden" id="edit-row">
        <div class="form-grid">
            <div class="form-group full"><label>기관명</label><input type="text" id="edit-institution"></div>
            <div class="form-group full"><label>프로그램명</label><input type="text" id="edit-program"></div>
            <div class="form-group"><label>날짜</label><input type="date" id="edit-date"></div>
            <div class="form-group"><label>글자 색상</label>
                <select id="edit-color">
                    <option value="#2c3e50" style="color: #2c3e50; font-weight: bold;">검정 (기본)</option>
                    <option value="#3498db" style="color: #3498db; font-weight: bold;">파랑</option>
                    <option value="#e74c3c" style="color: #e74c3c; font-weight: bold;">빨강</option>
                    <option value="#2ecc71" style="color: #2ecc71; font-weight: bold;">초록</option>
                    <option value="#f39c12" style="color: #f39c12; font-weight: bold;">오렌지</option>
                    <option value="#9b59b6" style="color: #9b59b6; font-weight: bold;">보라</option>
                    <option value="#1abc9c" style="color: #1abc9c; font-weight: bold;">청록</option>
                    <option value="#34495e" style="color: #34495e; font-weight: bold;">회색</option>
                </select>
            </div>
            <div class="form-group"><label>시작시간</label><input type="text" id="edit-start" placeholder="14:30" maxlength="5" oninput="autoColon(this)" inputmode="numeric"></div>
            <div class="form-group"><label>종료시간</label><input type="text" id="edit-end" placeholder="16:00" maxlength="5" oninput="autoColon(this)" inputmode="numeric"></div>
            <div class="form-group"><label>학년</label><input type="text" id="edit-grade"></div>
            <div class="form-group"><label>대상인원</label><input type="number" id="edit-students" placeholder="0" min="0"></div>
            <div class="form-group"><label>주강사</label><input type="text" id="edit-main"></div>
            <div class="form-group"><label>보조강사</label><input type="text" id="edit-sub"></div>
            <div class="form-group"><label>교구종류</label><input type="text" id="edit-tool"></div>
            <div class="form-group"><label>교구수량</label><input type="number" id="edit-count" placeholder="0" min="0"></div>
            <div class="form-group full"><label>비고</label><textarea id="edit-note" rows="4" placeholder="참고사항을 입력하세요."></textarea></div>
        </div>
        <div class="btn-group">
            <button class="btn-save" onclick="processData('update')">수정 저장</button>
            <button class="btn-delete" onclick="processData('delete')">일정 삭제</button>
            <button class="btn-close" onclick="closeModal()">닫기</button>
        </div>
    </div>

    <script>
        // ★ 본인의 GAS 웹 앱 URL을 여기에 넣으세요 ★
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzst3PGPjqrF9DCqfQFl6bFztp-AsIYq0LfuFJhYoFh5I1k1iG7oQ7XBJeCRpmYxio2/exec'; 

        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            const calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'ko',
                handleWindowResize: true,  // 브라우저 크기 조절 시 달력 크기 자동 재조정
                height: '100%',            // 부모 요소(#calendar-container)의 높이를 100% 따름
                expandRows: true,      // 일정이 적어도 행을 늘려 전체 높이를 채움
                dayMaxEvents: false,   // 일정 개수가 많아도 '+more'로 숨기지 않고 행 높이를 늘려 모두 표시
                fixedWeekCount: false,      // 해당 월의 실제 주수만큼만 표시 (6주 고정 해제)
                showNonCurrentDates: false, // 이전/다음 달의 날짜를 화면에서 숨김

                // [1] 24시간 형식 강제 설정
                eventTimeFormat: {
                    hour: '2-digit',
                    minute: '2-digit',
                    hour12: false // 오전/오후 표시 제거
                },
                
                // [2] 주간/일일 보기 왼쪽 시간축도 24시간제로 변경
                slotLabelFormat: {
                    hour: '2-digit',
                    minute: '2-digit',
                    hour12: false
                },
                
                // 주간(Week) 보기 추가
                headerToolbar: { 
                    left: 'prev,next today', 
                    center: 'title', 
                    right: 'dayGridMonth,timeGridWeek,listWeek' 
                },
                // index.html의 events: function 내부
                events: function(info, successCallback, failureCallback) {
                    fetch(GAS_URL)
                        .then(res => res.json())
                        .then(data => {
                            console.group("📅 캘린더 전체 일정 로드 디버깅");
                            console.log("1. 서버 응답 데이터 원본:", data);
                
                            const events = data.map((r, index) => {
                                // [시차 보정 핵심 로직]
                                const dateObj = new Date(r['날짜']);
                                const localDate = dateObj.toLocaleDateString('sv-SE'); // YYYY-MM-DD 형식 추출
                
                                const sTime = extractTime(r['시작시간']);
                                const eTime = extractTime(r['종료시간']);
                
                                // 첫 번째 데이터만 샘플로 상세 로그 남기기
                                if (index === 0) {
                                    console.log("--- 첫 번째 일정 보정 확인 ---");
                                    console.log("원본(r['날짜']):", r['날짜']);
                                    console.log("보정 후(localDate):", localDate);
                                    console.log("최종 시작점(start):", `${localDate}T${sTime}`);
                                }
                
                                return {
                                    title: r['프로그램명'],
                                    start: `${localDate}T${sTime}`,
                                    end: `${localDate}T${eTime}`,
                                    textColor: r['색상'] || '#2c3e50',
                                    extendedProps: r
                                };
                            });
                
                            console.log("2. 최종 변환된 이벤트 객체들:", events);
                            console.groupEnd();
                            
                            successCallback(events);
                        })
                        .catch(error => {
                            console.error("❌ 데이터 로드 중 오류 발생:", error);
                            failureCallback(error);
                        });
                },
                // [수정 핵심] 이벤트 2줄 구성 및 폰트 크기 적용
                eventContent: function(arg) {
                    const p = arg.event.extendedProps;
                    const time = extractTime(p['시작시간']);
                    const color = arg.event.textColor;
                    return {
                        html: `
                        <div class="event-wrapper" style="border-left-color: ${color}; color: ${color};">
                            <div class="event-line1">${time} | ${p['기관명']} | ${p['프로그램명']}</div>
                            <div class="event-line2">${p['주강사']} | ${p['교구종류']}(${p['교구수량']})</div>
                        </div>`
                    };
                },
                eventClick: function(info) { openModal(info.event.extendedProps); }
            });
            calendar.render();
            window.myCalendar = calendar;
        });

        // 시간 데이터에서 로컬 시간 기준 HH:mm 추출
        function extractTime(val) {
            if (!val) return "09:00"; // 기본값
            
            const valStr = String(val);
        
            // [핵심] T나 Z가 포함된 ISO 날짜 형식인 경우 (시차 보정이 필요한 경우)
            if (valStr.includes('T') || valStr.includes('Z')) {
                const d = new Date(valStr);
                // 브라우저의 로컬 시간을 기준으로 24시간 형식(HH:mm) 추출
                // 'en-GB' 로케일은 기본적으로 24시간 형식을 사용하므로 유용합니다.
                return d.toLocaleTimeString('en-GB', { 
                    hour: '2-digit', 
                    minute: '2-digit', 
                    hour12: false 
                });
            }
        
            // 이미 "13:00" 처럼 깨끗한 문자열로 들어오는 경우
            const match = valStr.match(/\d{2}:\d{2}/);
            return match ? match[0] : "09:00";
        }

        // 숫자를 입력하면 자동으로 14:30 형식을 만들어주는 함수
        function autoColon(target) {
            // 숫자만 남기기
            let val = target.value.replace(/\D/g, "");
            
            if (val.length > 2) {
                target.value = val.substring(0, 2) + ":" + val.substring(2, 4);
            } else {
                target.value = val;
            }
        }
        
        // 모달 열기 및 날짜 문자열 고정
        function openModal(p) {
            // 1. 시차 보정을 위해 날짜 객체 생성 (UTC 15:00 -> 한국 00:00 자동 변환)
            const dateObj = new Date(p['날짜']);
            
            // 2. 한국 시간 기준으로 YYYY-MM-DD 형식 추출 (sv-SE 포맷 활용 팁)
            const localDate = dateObj.toLocaleDateString('sv-SE');
        
            // 3. 모달 입력창들에 데이터 바인딩
            document.getElementById('edit-row').value = p.row;
            document.getElementById('edit-institution').value = p['기관명'] || '';
            document.getElementById('edit-program').value = p['프로그램명'] || '';
            
            // [핵심 수정] 보정된 날짜 입력
            document.getElementById('edit-date').value = localDate;
            document.getElementById('edit-start').value = extractTime(p['시작시간']);
            document.getElementById('edit-end').value = extractTime(p['종료시간']);
            document.getElementById('edit-grade').value = p['학년'] || '';
            document.getElementById('edit-students').value = p['대상인원'] || '';
            document.getElementById('edit-main').value = p['주강사'] || '';
            document.getElementById('edit-sub').value = p['보조강사'] || '';
            document.getElementById('edit-tool').value = p['교구종류'] || '';
            document.getElementById('edit-count').value = p['교구수량'] || 0;
            document.getElementById('edit-note').value = p['비고'] || '';
            document.getElementById('edit-color').value = p['색상'] || '#2c3e50';

            // 선택된 색상으로 글자색 변경
            const colorSelect = document.getElementById('edit-color');
            colorSelect.value = p['색상'] || '#2c3e50';
            colorSelect.style.color = colorSelect.value; 
            
            // 모달 표시
            document.getElementById('modalOverlay').style.display = 'block';
            document.getElementById('editModal').style.display = 'block';
        }

        // 데이터 수정 및 삭제 처리
        function processData(action) {
            if (action === 'delete' && !confirm("정말 이 일정을 영구 삭제하시겠습니까?")) return;
            
            // 1. 값 가져오기
            const startTime = document.getElementById('edit-start').value;
            const endTime = document.getElementById('edit-end').value;
        
            // 2. [중요] 유효성 검사를 '가장 먼저' 실행 (삭제가 아닐 때만)
            if (action !== 'delete') {
                if (!isValidTime(startTime)) {
                    alert("시작 시간을 올바른 형식(00:00 ~ 23:59)으로 입력해주세요.");
                    document.getElementById('edit-start').focus();
                    return;
                }
                if (!isValidTime(endTime)) {
                    alert("종료 시간을 올바른 형식(00:00 ~ 23:59)으로 입력해주세요.");
                    document.getElementById('edit-end').focus();
                    return;
                }
                if (startTime >= endTime) {
                    alert("종료 시간은 시작 시간보다 늦어야 합니다.");
                    document.getElementById('edit-end').focus();
                    return;
                }
            }
        
            // 3. 버튼 상태 변경
            const btn = document.querySelector('.btn-save');
            const originalText = btn.innerText;
            btn.innerText = '처리 중...'; 
            btn.disabled = true;
        
            // 4. 서버로 전송
            const payload = {
                action: action,
                row: document.getElementById('edit-row').value,
                date: document.getElementById('edit-date').value,
                startTime: startTime,
                endTime: endTime,
                program: document.getElementById('edit-program').value,
                institution: document.getElementById('edit-institution').value,
                grade: document.getElementById('edit-grade').value,
                students: document.getElementById('edit-students').value,
                mainTeacher: document.getElementById('edit-main').value,
                subTeacher: document.getElementById('edit-sub').value,
                toolType: document.getElementById('edit-tool').value,
                toolCount: document.getElementById('edit-count').value,
                note: document.getElementById('edit-note').value,
                color: document.getElementById('edit-color').value
            };
        
            fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) })
            .then(res => res.json())
            .then(() => {
                alert('정상적으로 처리되었습니다.');
                closeModal();
                window.myCalendar.refetchEvents();
            })
            .catch(err => alert('오류가 발생했습니다: ' + err))
            .finally(() => { 
                btn.innerText = originalText; 
                btn.disabled = false; 
            });
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
            document.getElementById('editModal').style.display = 'none';
        }
        // 입력된 시간이 유효한지 확인하는 함수 (00:00 ~ 23:59)
        function isValidTime(timeStr) {
            // 1. HH:mm 형식인지 정규식 검사
            const timeRegex = /^([01]\d|2[0-3]):([0-5]\d)$/;
            if (!timeRegex.test(timeStr)) return false;
        
            // 2. 시간과 분을 숫자로 분리하여 상세 확인
            const [hours, minutes] = timeStr.split(':').map(Number);
            if (hours < 0 || hours > 23) return false;
            if (minutes < 0 || minutes > 59) return false;
        
            return true;
        }
        
    </script>
</body>
