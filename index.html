<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>출강 관리 시스템 (실시간 최적화)</title>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Pretendard', sans-serif; background: #f4f7f9; }
        .wrapper { display: flex; flex-direction: column; height: 100vh; padding: 15px; box-sizing: border-box; }
        .nav-bar { background: var(--primary); color: white; padding: 12px 20px; border-radius: 8px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .nav-links a { color: white; text-decoration: none; margin-left: 15px; font-weight: bold; font-size: 0.9em; padding: 6px 12px; border: 1px solid rgba(255,255,255,0.3); border-radius: 4px; }
        #calendar-container { flex-grow: 1; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); min-height: 0; }
        #calendar { height: 100%; }
        #modalOverlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:999; }
        #detailModal { display: none; position: fixed; z-index: 1000; left: 50%; top: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 400px; }
        .info-row { margin-bottom: 8px; font-size: 0.95em; display: flex; }
        .info-label { font-weight: bold; color: #888; width: 90px; flex-shrink: 0; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="nav-bar">
            <strong>🏫 출강 관리 시스템</strong>
            <div class="nav-links">
                <a href="input.html" style="color: #5ef19b;">+ 새 수업 입력</a>
                <a href="manage.html">📊 정산 대시보드</a>
            </div>
        </div>
        <div id="calendar-container"><div id="calendar"></div></div>
    </div>

    <div id="modalOverlay" onclick="closeModal()"></div>
    <div id="detailModal">
        <h3 id="m-title" style="margin:0 0 15px 0; color:var(--primary);">강의 상세</h3>
        <div id="modalBody"></div>
        <button onclick="closeModal()" style="margin-top:20px; width:100%; padding:10px; cursor:pointer; border:none; border-radius:6px; background:#eee;">닫기</button>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbyTMFj7peDa4JSiq6RE1Uvd04n84LUW5HdREtdS4OuTU93S61oQqvRjyAVf6NSVI6hF/exec';

        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            const calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'ko',
                height: '100%',
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek,listWeek' },
                events: function(info, successCallback, failureCallback) {
                    fetch(GAS_URL)
                        .then(res => res.json())
                        .then(data => {
                            console.log("실제 받은 데이터:", data);
                            const events = data.filter(r => r['날짜']).map(r => {
                                // 1. 날짜 처리 (시트에서 Date객체로 넘어올 경우를 대비해 T 이후를 잘라냄)
                                const rawDate = String(r['날짜']).split('T')[0];
                                
                                // 2. 시간 처리 (HH:mm 형식이 아닌 숫자로 올 경우를 대비)
                                const sTime = String(r['시작시간'] || "09:00").substring(0, 5);
                                const eTime = String(r['종료시간'] || "10:00").substring(0, 5);
                                
                                return {
                                    title: `[${r['기관명'] || '기관'}] ${r['프로그램명'] || '수업'}`,
                                    start: `${rawDate}T${sTime.padStart(5, '0')}`,
                                    end: `${rawDate}T${eTime.padStart(5, '0')}`,
                                    extendedProps: r,
                                    color: r['주강사'] ? '#3498db' : '#95a5a6'
                                };
                            });
                            successCallback(events);
                        })
                        .catch(err => {
                            console.error("데이터 불러오기 에러:", err);
                            failureCallback(err);
                        });
                },
                eventClick: function(info) { showModal(info.event.extendedProps); }
            });
            calendar.render();
        });

        function showModal(p) {
            document.getElementById('m-title').innerText = p['기관명'] || '강의 정보';
            document.getElementById('modalBody').innerHTML = `
                <div class="info-row"><span class="info-label">날짜:</span> ${String(p['날짜']).split('T')[0]}</div>
                <div class="info-row"><span class="info-label">시간:</span> ${p['시작시간']} ~ ${p['종료시간']}</div>
                <div class="info-row"><span class="info-label">프로그램:</span> ${p['프로그램명']}</div>
                <div class="info-row"><span class="info-label">대상:</span> ${p['학년']} (${p['대상인원']}명)</div>
                <div class="info-row"><span class="info-label">강사:</span> 주:${p['주강사']} / 보:${p['보조강사']||'-'}</div>
                <div class="info-row"><span class="info-label">비고:</span> ${p['비고']||'-'}</div>
            `;
            document.getElementById('modalOverlay').style.display = 'block';
            document.getElementById('detailModal').style.display = 'block';
        }
        function closeModal() { document.getElementById('modalOverlay').style.display='none'; document.getElementById('detailModal').style.display='none'; }
    </script>
</body>
</html>
