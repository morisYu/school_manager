<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>꿈잡끼 출강 관리 시스템</title>

    <link rel="shortcut icon" href="./favicon_images/favicon.ico" type="image/x-icon">
    <link rel="icon" href="./favicon_images/favicon.ico" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon_images/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon_images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="./favicon_images/favicon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="./favicon_images/favicon-512x512.png">
    <link rel="apple-touch-icon" href="./favicon_images/favicon-192x192.png">

    <meta name="msapplication-TileImage" content="./favicon_images/favicon-192x192.png">
    <meta name="msapplication-TileColor" content="#2c3e50">

    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/calendar.css">
    <link rel="stylesheet" href="css/forms.css">
</head>

<body>
    <div class="system-header">
        <div class="header-container">
            <div class="header-left">
                <a href="index.html" class="header-logo">🏫 출강 관리 시스템</a>
            </div>
            <div class="header-right">
                <button class="nav-btn btn-add" onclick="location.href='pages/input.html'">📅 일정 추가</button>
                <button class="nav-btn btn-school" onclick="location.href='pages/school-manage.html'">🏫 학교 관리</button>
                <button class="nav-btn btn-manage" onclick="location.href='pages/manage.html'">📊 강사 관리</button>
            </div>
        </div>
    </div>

    <div class="wrapper">
        <div id="calendar-container">
            <div id="calendar"></div>
        </div>
    </div>


    <div id="modal-overlay" onclick="closeModal()"></div>
    <div class="modal-content" id="edit-modal">
        <div class="modal-header">
            <h2 style="margin: 0; font-size: 1.25rem;">📅 일정 상세 및 수정</h2>
        </div>

        <div class="modal-body">
            <div class="form-grid">
                <input type="hidden" id="edit-row">

                <!-- Row 1: 색상(2), 지역구분(2), 기관명(4), 프로그램명(4) -->
                <div class="form-group row1-color">
                    <label>색상</label>
                    <select id="edit-color" onchange="this.style.color=this.value">
                        <option value="#3498db" style="color: #2980b9;">파랑</option>
                        <option value="#f39c12" style="color: #f39c12;">주황</option>
                        <option value="#2ecc71" style="color: #2ecc71;">초록</option>
                        <option value="#2c3e50" style="color: #2c3e50;">검정</option>
                        <option value="#8e44ad" style="color: #8e44ad;">보라</option>
                        <option value="#795548" style="color: #795548;">갈색</option>
                        <option value="#e67e22" style="color: #e67e22;">황토</option>
                    </select>
                </div>
                <div class="form-group row1-region">
                    <label>지역 구분</label>
                    <select id="edit-region">
                        <option value="대구">대구</option>
                        <option value="부산">부산</option>
                        <option value="울산">울산</option>
                        <option value="포항">포항</option>
                        <option value="기타">기타</option>
                    </select>
                </div>
                <div class="form-group row1-institution">
                    <label>기관명</label>
                    <input type="text" id="edit-institution">
                </div>
                <div class="form-group row1-program">
                    <label>프로그램명</label>
                    <input type="text" id="edit-program">
                </div>

                <!-- Row 2: 날짜, 시작 시간, 종료 시간, 학년, 대상인원 (5분할) -->
                <div class="form-group row2-date">
                    <label>날짜</label>
                    <input type="date" id="edit-date">
                </div>
                <div class="form-group row2-start">
                    <label>시작 시간</label>
                    <input type="text" id="edit-start" maxlength="5" placeholder="10:00" oninput="autoColon(this)">
                </div>
                <div class="form-group row2-end">
                    <label>종료 시간</label>
                    <input type="text" id="edit-end" maxlength="5" placeholder="13:00" oninput="autoColon(this)">
                </div>
                <div class="form-group row2-grade">
                    <label>학년</label>
                    <input type="text" id="edit-grade" placeholder="예: 1-1">
                </div>
                <div class="form-group row2-students">
                    <label>대상인원</label>
                    <input type="text" id="edit-students" placeholder="예: 25명">
                </div>

                <!-- Row 3: 교구 종류, 교구 수량, 주강사, 보조강사 (4분할) -->
                <div class="form-group row3-tool">
                    <label>교구 종류</label>
                    <input type="text" id="edit-tool">
                </div>
                <div class="form-group row3-count">
                    <label>교구 수량</label>
                    <input type="number" id="edit-count">
                </div>
                <div class="form-group row3-main">
                    <label>주강사</label>
                    <input type="text" id="edit-main">
                </div>
                <div class="form-group row3-sub">
                    <label>보조강사</label>
                    <input type="text" id="edit-sub">
                </div>

                <!-- Row 4: 비고 (전체) -->
                <div class="form-group row4-note span-note">
                    <label>비고</label>
                    <textarea id="edit-note" rows="4"></textarea>
                </div>
            </div>

            <div class="btn-group">
                <button id="save-btn" class="btn-save" onclick="saveEvent()">저장하기</button>
                <button id="duplicate-btn" class="btn-duplicate" onclick="duplicateEvent()">복제</button>
                <button id="delete-btn" class="btn-delete" onclick="deleteEvent()">삭제</button>
                <button class="btn-close" onclick="closeModal()">닫기</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <script src="js/config.js?v=2"></script>
    <script src="js/utils.js?v=2"></script>
    <script src="js/calendar-main.js?v=2"></script>
    <script src="js/api-handler.js?v=2"></script>
</body>

</html>
